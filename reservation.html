<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reserve a Table | Luxe Café</title>
  <meta name="description" content="Reserve your table at Luxe Café.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar">
    <div class="logo">LUXE CAFÉ</div>
    
<button class="menu-toggle" aria-label="Open menu">☰</button>
    
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a class="active" href="reservation.html">Reserve</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main>
    <section class="reservation-section">

      <div class="reservation-heading">
        <p class="eyebrow">LUXURY DINING AWAITS</p>
        <h1 class="section-title">Reserve Your Table</h1>
        <p>Choose your preferred date and time. We will make your visit special.</p>
      </div>

      <form class="reservation-form" id="reservationForm">

        <label for="name">Full Name</label>
        <input id="name" type="text" placeholder="Enter your full name" required>

        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="Enter your email address" required>

        <label for="phone">Phone Number</label>
        <input id="phone" type="tel" placeholder="Enter your phone number" required>

        <div class="form-row">
          <div>
            <label for="date">Date</label>
            <input id="date" type="date" required>
          </div>

          <div>
            <label for="time">Time</label>
            <input id="time" type="time" required>
          </div>
        </div>

        <label for="guests">Number of Guests</label>
        <select id="guests" required>
          <option value="" selected disabled>Select number of guests</option>
          <option>1 Guest</option>
          <option>2 Guests</option>
          <option>3 Guests</option>
          <option>4 Guests</option>
          <option>5 Guests</option>
          <option>6+ Guests</option>
        </select>

        <label for="request">Special Requests <span>(optional)</span></label>
        <textarea id="request" placeholder="Birthday, anniversary, food preferences, etc." rows="5"></textarea>

        <button type="submit" class="btn">Reserve Now</button>

        <p class="form-message" id="formMessage"></p>

      </form>

    </section>
  </main>

  <footer>
    <h3>LUXE CAFÉ</h3>
    <p>Open Daily • 10 AM – 11 PM</p>
    <p>© 2026 Luxe Café. All Rights Reserved.</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
